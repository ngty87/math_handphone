<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>計算トレーニング・スマホ版</title>
    <style>
        :root {
            --bg-color: #f0f9ff;
            --key-bg: #ffffff;
            --key-text: #334155;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --gold: #f59e0b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #daily-timer-header {
            background: #ffffff;
            padding: 8px 15px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        #total-time-display { color: var(--gold); }
        #total-time-display.target-met { color: var(--accent-green); font-size: 16px; }

        #display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            text-align: center;
            box-sizing: border-box;
            min-height: 0;
        }
        h1 { font-size: 19px; color: #0284c7; margin: 0 0 5px 0; }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        .timer-container { width: 100%; background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #4ade80, #ef4444); transition: width 0.1s linear; }

        #formula-display { font-size: 48px; font-weight: bold; margin: 8px 0; color: #1e293b; }
        #user-input { color: var(--accent-blue); border-bottom: 4px solid #cbd5e1; min-width: 45px; display: inline-block; text-align: center; }

        /* 達成感：モード別バッジ */
        .mode-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }
        .status-yet { background: #e2e8f0; color: #94a3b8; }
        .status-done { background: #dcfce7; color: #166534; font-weight: bold; }
        .star-count { color: var(--gold); font-weight: bold; margin-left: 5px; }

        .ranking-box {
            margin-top: 8px;
            background: #f8fafc;
            border-radius: 10px;
            padding: 6px;
            font-size: 12px;
            text-align: left;
        }
        .rank-item { display: flex; justify-content: space-between; margin: 2px 0; }

        #keypad {
            background: #cbd5e1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            padding: 6px;
            box-sizing: border-box;
            padding-bottom: calc(6px + env(safe-area-inset-bottom)); 
            flex-shrink: 0;
        }
        .key {
            background: var(--key-bg);
            border: none;
            height: 58px;
            font-size: 24px;
            font-weight: bold;
            color: var(--key-text);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .key:active { background: #cbd5e1; transform: scale(0.96); }
        .key.op { background: #f1f5f9; color: var(--accent-blue); font-size: 20px; }
        .key.enter { background: var(--accent-blue); color: white; grid-row: span 2; height: 118px; font-size: 30px; }

        #full-screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 180px; font-weight: bold; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
        .overlay-correct { background: rgba(220, 252, 231, 0.75); color: var(--accent-green); }
        .overlay-wrong { background: rgba(254, 226, 226, 0.75); color: var(--accent-red); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="daily-timer-header">
    きょうのチャレンジ：<span id="total-time-display">0分00秒</span>
</div>

<div id="display-area">
    <div id="layer-1" class="info-card">
        <h1>たしざん・ひきざん<br><span style="color:var(--gold)">ＡＩトレーニング！</span></h1>
        <div style="font-weight: bold; color: #3b82f6; font-size:17px; background:#eff6ff; padding:12px; border-radius:10px; margin-top:5px;">
            [ ＋ ] たしざん<br>[ － ] ひきざん
        </div>
        <div id="overall-clear-info" style="margin-top:10px; font-size:12px; color:#64748b;">
            全モードクリアを めざそう！
        </div>
    </div>

    <div id="layer-2" class="info-card hidden">
        <h2 id="mode-title" style="margin:0; color:#0284c7; font-size:18px;">たしざん</h2>
        <div style="text-align: left; font-size: 14px; margin-top:8px;">
            <div style="background:#fff7ed; padding:8px; border-radius:8px; border:1px solid #fed7aa; margin-bottom:8px;">
                <b>[ 1 ] ４３もん チャレ</b><span id="badge-ch" class="mode-status"></span><span id="stars-ch" class="star-count"></span>
                <div id="best-challenge" class="ranking-box"></div>
            </div>
            <div id="tokkun-option" style="background:#f0fdf4; padding:8px; border-radius:8px; border:1px solid #bbf7d0;">
                <b>[ 2 ] ３０びょう チャレ</b><span id="badge-tk" class="mode-status"></span><span id="stars-tk" class="star-count"></span>
                <div id="best-tokkun" class="ranking-box"></div>
            </div>
            <p style="text-align:center; color:#64748b; font-weight:bold; font-size:12px; margin-top:8px;">[ ＋ ] か [ － ] で もどる</p>
        </div>
    </div>

    <div id="layer-3" class="hidden" style="width:100%">
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div id="timer-text" style="font-weight:bold; color:var(--accent-red); font-size:18px;">0.0s</div>
        <div id="formula-display"><span id="formula-text"></span><span id="user-input"></span></div>
        <div style="font-weight:bold; color:#64748b; font-size:15px;">
            <span id="score-label">せいかい:</span> <span id="score" style="color:var(--accent-blue)">0</span> / <span id="target-count">43</span>
        </div>
    </div>

    <div id="layer-4" class="info-card hidden">
        <h2 id="result-title" style="margin:0; font-size:20px;">クリア！</h2>
        <div id="result-body" style="font-size: 20px; font-weight: bold; margin:5px 0;"></div>
        <div id="time-comparison" style="font-size:13px; color:var(--gold); font-weight:bold;"></div>
        <div id="rank-stars-info" style="margin:5px 0; color:var(--gold); font-size:18px;"></div>
        
        <div id="weak-section" class="hidden" style="background:#fff1f2; padding:8px; border-radius:10px; margin-top:5px;">
            <p style="color:var(--accent-red); margin:0; font-size:12px; font-weight:bold;">🔥 にがてな もんだい</p>
            <div id="weak-list" style="font-size:18px; font-weight:bold; color:#e11d48;"></div>
        </div>
        <p style="font-size:12px; margin-top:8px; color:#64748b; font-weight:bold;">[ ◎ ] で つぎへ</p>
    </div>
</div>

<div id="keypad">
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key op" onclick="pressKey('+')">＋</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key op" onclick="pressKey('-')">－</button>
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key enter" onclick="pressKey('Enter')">◎</button>
    <button class="key" style="grid-column: span 3;" onclick="pressKey('0')">0</button>
</div>

<div id="full-screen-overlay">〇</div>

<script>
    let currentLayer = 1, mode = 'add', playType = 'challenge';
    let score = 0, msElapsed = 0, msLeft = 30000, timerInterval = null;
    let currentAnswer = 0, currentInput = "", isUnlockedAdd = false, isUnlockedSub = false;
    let totalSeconds = 0;

    // 記録とクリア回数
    let records = { add_ch: [], add_tk: [], sub_ch: [], sub_tk: [] };
    let clearCounts = { add_ch: 0, add_tk: 0, sub_ch: 0, sub_tk: 0 };
    let aiStats = [];
    let problemQueue = [], currentProblem = null, startTime = 0;

    // 通算タイマー
    setInterval(() => {
        totalSeconds++;
        const m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
        const display = document.getElementById('total-time-display');
        display.innerText = `${m}分${s.toString().padStart(2, '0')}秒`;
        if (totalSeconds >= 600) { display.classList.add('target-met'); display.innerText = `✨ ${m}分${s.toString().padStart(2, '0')}秒 (達成！)`; }
    }, 1000);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') { osc.frequency.value = 800; gain.gain.setValueAtTime(0.03, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.04); }
        else if (type === 'correct') { [523, 659, 783].forEach((f, i) => { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.setValueAtTime(0.08, audioCtx.currentTime + i*0.08); o.start(audioCtx.currentTime + i*0.08); o.stop(audioCtx.currentTime + i*0.08 + 0.08); }); }
        else if (type === 'wrong') { osc.frequency.value = 140; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.25); }
    }

    function updateRankingDisplay(typeKey, elementId) {
        const el = document.getElementById(elementId), data = records[typeKey];
        if (data.length === 0) { el.innerHTML = "記録なし"; return; }
        let html = ""; const unit = typeKey.includes('_ch') ? "秒" : "問";
        data.slice(0, 3).forEach((val, i) => { const icons = ["🥇", "🥈", "🥉"]; html += `<div class="rank-item"><span>${icons[i]} ${val}${unit}</span></div>`; });
        el.innerHTML = html;
    }

    function updateBadges() {
        const prefix = mode === 'add' ? 'add' : 'sub';
        const chKey = prefix + '_ch', tkKey = prefix + '_tk';
        
        const setBadge = (id, count, starId) => {
            const el = document.getElementById(id), sEl = document.getElementById(starId);
            if (count > 0) { el.innerText = "クリア済み！"; el.className = "mode-status status-done"; sEl.innerText = " ★×" + count; }
            else { el.innerText = "未クリア"; el.className = "mode-status status-yet"; sEl.innerText = ""; }
        };
        setBadge('badge-ch', clearCounts[chKey], 'stars-ch');
        setBadge('badge-tk', clearCounts[tkKey], 'stars-tk');
    }

    function switchLayer(layerId) {
        currentLayer = layerId;
        ['layer-1', 'layer-2', 'layer-3', 'layer-4'].forEach(id => document.getElementById(id).classList.toggle('hidden', id !== 'layer-' + layerId));
        if (layerId === 2) {
            document.getElementById('mode-title').innerText = (mode === 'add' ? "【たしざん】" : "【ひきざん】");
            let unlocked = (mode === 'add' ? isUnlockedAdd : isUnlockedSub);
            document.getElementById('tokkun-option').style.opacity = unlocked ? "1" : "0.3";
            const p = mode === 'add' ? 'add' : 'sub';
            updateRankingDisplay(p + '_ch', 'best-challenge'); updateRankingDisplay(p + '_tk', 'best-tokkun');
            updateBadges();
        }
    }

    function pressKey(key) {
        playSound('click');
        if (currentLayer === 1) { if (key === '+') { mode = 'add'; switchLayer(2); } if (key === '-') { mode = 'sub'; switchLayer(2); } }
        else if (currentLayer === 2) { if (key === '1') { playType = 'challenge'; startGame(); } if (key === '2' && (mode === 'add' ? isUnlockedAdd : isUnlockedSub)) { playType = 'tokkun'; startGame(); } if (key === '+' || key === '-') { switchLayer(1); } }
        else if (currentLayer === 3) { if (/[0-9]/.test(key)) handleNumInput(key); }
        else if (currentLayer === 4) { if (key === 'Enter') switchLayer(2); }
    }

    function startGame() {
        score = 0; currentInput = ""; problemQueue = [];
        let list = [];
        if (mode === 'add') { for(let i=2;i<=9;i++) for(let j=2;j<=9;j++) if(i+j>=10) list.push({n1:i, n2:j}); }
        else { for(let i=11;i<=18;i++) { let m=(i%10)+1; for(let j=m;j<=9;j++) list.push({n1:i, n2:j}); } }
        list.sort(() => Math.random() - 0.5);
        list.forEach(b => { if(!aiStats.some(s => s.n1 === b.n1 && s.n2 === b.n2 && s.mode === mode)) aiStats.push({n1:b.n1, n2:b.n2, mode, totalTime:0, count:0}); });
        if (playType === 'challenge') { problemQueue = list; document.getElementById('target-count').innerText = "43"; document.getElementById('score-label').innerText = "せいかい:"; document.getElementById('timer-bar').style.width = "100%"; }
        else { let f = aiStats.filter(s => s.mode === mode); f.sort((a,b) => (b.totalTime/(b.count||1)) - (a.totalTime/(a.count||1))); problemQueue = f.map(s => ({n1:s.n1, n2:s.n2})); document.getElementById('target-count').innerText = "？"; document.getElementById('score-label').innerText = "てんすう:"; }
        switchLayer(3); nextQuestion();
        clearInterval(timerInterval);
        if (playType === 'challenge') { msElapsed = 0; timerInterval = setInterval(() => { msElapsed += 100; document.getElementById('timer-text').innerText = (msElapsed/1000).toFixed(1) + "s"; }, 100); }
        else { msLeft = 30000; timerInterval = setInterval(() => { msLeft -= 100; document.getElementById('timer-text').innerText = (msLeft/1000).toFixed(1) + "s"; document.getElementById('timer-bar').style.width = (msLeft/30000*100) + '%'; if(msLeft <= 0) endGame(true); }, 100); }
    }

    function nextQuestion() {
        if (problemQueue.length === 0) { if (playType === 'challenge') { endGame(false); return; } else { startGame(); return; } }
        currentProblem = problemQueue.shift(); currentInput = ""; document.getElementById('user-input').innerText = "";
        let sign = (mode === 'add' ? '+' : '-'); currentAnswer = (mode === 'add' ? currentProblem.n1 + currentProblem.n2 : currentProblem.n1 - currentProblem.n2);
        document.getElementById('formula-text').innerText = `${currentProblem.n1}${sign}${currentProblem.n2}=`; document.getElementById('score').innerText = score; startTime = performance.now();
    }

    function handleNumInput(num) {
        currentInput += num; document.getElementById('user-input').innerText = currentInput;
        let t = currentAnswer.toString();
        if (t.length > currentInput.length) { if (!t.startsWith(currentInput)) checkAnswer(false); return; }
        checkAnswer(currentInput === t);
    }

    function checkAnswer(isCorrect) {
        const elapsed = performance.now() - startTime; const overlay = document.getElementById('full-screen-overlay');
        if (playType === 'tokkun' && msLeft <= 0) return;
        let stats = aiStats.find(s => s.n1 === currentProblem.n1 && s.n2 === currentProblem.n2 && s.mode === mode);
        if (stats) { stats.totalTime += (isCorrect ? elapsed : 5000); stats.count++; }
        if (isCorrect) { playSound('correct'); overlay.innerText = "〇"; overlay.className = "overlay-correct"; score++; }
        else { playSound('wrong'); overlay.innerText = "×"; overlay.className = "overlay-wrong"; problemQueue.push({n1: currentProblem.n1, n2: currentProblem.n2}); }
        overlay.style.opacity = "1";
        if (playType === 'challenge' && problemQueue.length === 0 && isCorrect) { setTimeout(() => { overlay.style.opacity = "0"; endGame(false); }, 200); }
        else { setTimeout(() => { overlay.style.opacity = "0"; nextQuestion(); }, 200); }
    }

    function endGame(isTimeUp) {
        clearInterval(timerInterval);
        const title = document.getElementById('result-title'), body = document.getElementById('result-body'), comp = document.getElementById('time-comparison');
        const starInfo = document.getElementById('rank-stars-info');
        comp.innerText = ""; starInfo.innerText = "";
        const p = mode === 'add' ? 'add' : 'sub', key = p + (playType === 'challenge' ? '_ch' : '_tk');

        if (playType === 'challenge' && !isTimeUp) {
            title.innerText = "⭐ クリア！ ⭐"; let time = (msElapsed/1000).toFixed(1);
            body.innerHTML = `タイム: <span style="color:var(--accent-blue)">${time}秒</span>`;
            let list = records[key]; if (list.length === 0 || parseFloat(time) < list[0]) starInfo.innerText = "🎊 自己ベスト更新！ 🎊";
            list.push(parseFloat(time)); list.sort((a,b) => a - b);
            if (mode === 'add') isUnlockedAdd = true; else isUnlockedSub = true;
            clearCounts[key]++;
        } else {
            title.innerText = "タイムアップ！"; body.innerHTML = `せいかい: <span style="color:var(--accent-green)">${score}もん</span>`;
            let list = records[key]; if (list.length === 0 || score > list[0]) starInfo.innerText = "🎊 自己ベスト更新！ 🎊";
            list.push(score); list.sort((a,b) => b - a);
            clearCounts[key]++;
        }
        
        starInfo.innerText += " ★ ゲット！";

        let weak = aiStats.filter(s => s.mode === mode && s.count > 0).sort((a,b) => (b.totalTime/b.count) - (a.totalTime/a.count)).filter(s => (s.totalTime/s.count) > 1800).slice(0, 2);
        const weakSec = document.getElementById('weak-section'), weakList = document.getElementById('weak-list');
        weakList.innerHTML = "";
        if (weak.length > 0) { weak.forEach(s => { let sign = (mode === 'add' ? '+' : '-'), ans = (mode === 'add' ? s.n1 + s.n2 : s.n1 - s.n2); weakList.innerHTML += `<div>${s.n1}${sign}${s.n2}=${ans}</div>`; }); weakSec.classList.remove('hidden'); }
        else { weakSec.classList.add('hidden'); }
        switchLayer(4);
    }
</script>
</body>
</html>
